<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentazione MPAS — Riservato</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Outfit', sans-serif; background: #F7F3EE; color: #1a1e2e; height: 100vh; display: flex; align-items: center; justify-content: center; }
  .gate { background: #fff; padding: 48px 40px; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,45,114,0.08); max-width: 420px; width: calc(100% - 32px); text-align: center; }
  h1 { font-size: 18px; font-weight: 600; color: #002d72; margin-bottom: 8px; letter-spacing: 0.2px; }
  p { font-size: 14px; color: #5a6070; margin-bottom: 28px; line-height: 1.6; }
  input { width: 100%; padding: 14px 16px; border: 1px solid #D4C5B0; border-radius: 8px; font-family: inherit; font-size: 15px; color: #1a1e2e; background: #F7F3EE; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #fc4c02; }
  button { width: 100%; margin-top: 12px; padding: 14px 16px; background: #fc4c02; color: #fff; border: none; border-radius: 8px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #e03f00; }
  .error { color: #c45a4a; font-size: 13px; margin-top: 12px; min-height: 18px; }
  iframe { display: none; border: none; width: 100vw; height: 100vh; }
  body.unlocked { display: block; height: 100vh; overflow: hidden; }
  body.unlocked .gate { display: none; }
  body.unlocked iframe { display: block; }
</style>
</head>
<body>
  <div class="gate">
    <h1>Presentazione MPAS</h1>
    <p>Documento riservato. Inserisci la password ricevuta via email per accedere.</p>
    <form id="form" autocomplete="off">
      <input id="pwd" type="password" placeholder="Password" autofocus>
      <button type="submit">Entra</button>
      <div class="error" id="error"></div>
    </form>
  </div>
  <iframe id="content" src="content.html"></iframe>
<script>
  const PWD = "pionieri130";
  const KEY = "mpas_presentazione_auth";
  function unlock() { document.body.classList.add("unlocked"); }
  if (sessionStorage.getItem(KEY) === PWD) { unlock(); }
  document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();
    const val = document.getElementById("pwd").value;
    if (val === PWD) { sessionStorage.setItem(KEY, PWD); unlock(); }
    else { document.getElementById("error").textContent = "Password non valida"; document.getElementById("pwd").value = ""; }
  });
</script>
</body>
</html>
